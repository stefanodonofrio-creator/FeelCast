<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeelCast</title>
</head>

<body style="font-family: Arial; padding:20px; max-width:750px; margin:auto;">

<h2>FeelCast</h2>
<p style="color:#555;">Not the weather. The feeling.</p>

<label><strong>Profilo:</strong></label><br>
<select id="profile">
  <option value="0">Neutro</option>
  <option value="-1">Freddoloso</option>
  <option value="1">Caloroso</option>
</select>

<br><br>

<label><strong>Luogo:</strong></label><br>
<input type="radio" name="mode" value="geo" checked> Posizione attuale<br>
<input type="radio" name="mode" value="city"> Cerca città

<div id="cityBox" style="display:none; margin-top:10px;">
  <input type="text" id="cityInput" placeholder="es. Berlin" style="width:100%; max-width:400px;">
  <div id="suggestions" style="border:1px solid #ddd; max-width:400px;"></div>
</div>

<br>

<label><strong>Data e ora:</strong></label><br>
<input type="datetime-local" id="datetime">

<br><br>

<button onclick="checkWeather()">Controlla</button>

<hr>

<div id="result" style="white-space: pre-line; font-size:18px;"></div>

<div id="feedbackBox" style="display:none; margin-top:20px;">
  <strong>Feedback:</strong><br><br>
  <button onclick="sendFeedback('ok')">👍</button>
  <button onclick="sendFeedback('meh')">😐</button>
  <button onclick="sendFeedback('no')">👎</button>

  <div id="feedbackStatus" style="margin-top:10px;"></div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/library/d/1Rf2tAd9lQbz6NB2_wy7isrx6H9JDOu8BsjTbYZZLx4dToP30FrAr8T5q/3";

let lastResult = null;
let selectedCity = null;
let debounceTimer;

/* UI toggle */

document.querySelectorAll('input[name="mode"]').forEach(r=>{
  r.addEventListener('change',()=>{
    document.getElementById("cityBox").style.display =
      (r.value==="city" && r.checked) ? "block" : "none";
  });
});

/* default datetime */

(function(){
  const now = new Date();
  now.setMinutes(0,0,0);
  document.getElementById("datetime").value =
    new Date(now - now.getTimezoneOffset()*60000)
    .toISOString().slice(0,16);
})();

/* autocomplete città */

document.getElementById("cityInput").addEventListener("input", function () {

  clearTimeout(debounceTimer);

  const query = this.value.trim();
  const box = document.getElementById("suggestions");

  if (query.length < 2) {
    box.innerHTML = "";
    return;
  }

  debounceTimer = setTimeout(async () => {

    const res = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5`
    );

    const data = await res.json();
    box.innerHTML = "";

    if (!data.results) return;

    data.results.forEach(r => {

      const div = document.createElement("div");
      div.style.padding = "6px";
      div.style.cursor = "pointer";
      div.style.borderBottom = "1px solid #eee";

      div.innerText = `${r.name}, ${r.country}`;

      div.onclick = () => {
        selectedCity = r;
        document.getElementById("cityInput").value = `${r.name}, ${r.country}`;
        box.innerHTML = "";
      };

      box.appendChild(div);
    });

  }, 300);
});

/* coordinate */

function getCoords(){
  return new Promise((resolve,reject)=>{

    const mode = document.querySelector('input[name="mode"]:checked').value;

    if(mode==="city"){
      if(selectedCity){
        resolve({
          lat:selectedCity.latitude,
          lon:selectedCity.longitude,
          label:`${selectedCity.name}, ${selectedCity.country}`
        });
      } else {
        reject("Seleziona una città dalla lista");
      }
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat:pos.coords.latitude,
        lon:pos.coords.longitude,
        label:"Posizione attuale"
      }),
      ()=>reject("Autorizza la posizione")
    );

  });
}

/* helper */

function closestIndex(times, target){
  const t = new Date(target).getTime();
  let best=0, diff=Infinity;

  times.forEach((time,i)=>{
    const d=Math.abs(new Date(time).getTime()-t);
    if(d<diff){ diff=d; best=i;}
  });

  return best;
}

/* main */

async function checkWeather(){

  const resultDiv = document.getElementById("result");
  const fbBox = document.getElementById("feedbackBox");
  const fbStatus = document.getElementById("feedbackStatus");

  resultDiv.innerText="Caricamento...";
  fbBox.style.display="none";
  fbStatus.innerText="";
  lastResult=null;

  try{

    const {lat,lon,label} = await getCoords();
    const dt = document.getElementById("datetime").value;
    const profileVal = parseInt(document.getElementById("profile").value);
    const profileLabel = document.getElementById("profile").selectedOptions[0].text;

    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=apparent_temperature,wind_speed_10m,wind_gusts_10m,relative_humidity_2m,cloudcover&timezone=auto`;

    const res = await fetch(url);
    const data = await res.json();

    const i = closestIndex(data.hourly.time, dt);

    const T = data.hourly.apparent_temperature[i];
    const wind = data.hourly.wind_speed_10m[i];
    const gusts = data.hourly.wind_gusts_10m[i];
    const RH = data.hourly.relative_humidity_2m[i];
    const cloud = data.hourly.cloudcover[i] ?? 0;

    let score=T;

    if(gusts>25) score-=2;
    else if(wind>15) score-=1;

    if(cloud<30) score+=1;
    if(RH>70 && T<10) score-=0.5;

    score+=profileVal;

    let feeling = score<8?"Freddo":
                  score<14?"Fresco":
                  score<18?"Leggermente fresco":
                  "Ok / caldo leggero";

    let driver =
      gusts>25?"raffiche":
      wind>15?"vento":
      cloud<30?"sole":
      RH>70?"umidità":
      "stabile";

    let note =
      gusts>25?"sensazione a tratti più fredda nelle zone esposte":
      wind>15?"più freddo del previsto sulle parti esposte":
      cloud<30?"al sole si sta meglio":
      RH>70?"freddo più penetrante":
      "condizioni stabili";

    resultDiv.innerText =
      `Luogo: ${label}\n` +
      `Ora: ${data.hourly.time[i]}\n\n` +
      `${feeling}\n` +
      `soprattutto per ${driver}\n` +
      `${note}`;

    lastResult={
      profile:profileLabel,
      lat,lon,
      location_label:label,
      selected_datetime:data.hourly.time[i],
      apparent_temperature:T,
      wind,gusts,
      humidity:RH,
      cloudcover:cloud,
      feeling,driver,note
    };

    fbBox.style.display="block";

  } catch(e){
    resultDiv.innerText=e;
  }
}

/* feedback */

async function sendFeedback(type){

  const status = document.getElementById("feedbackStatus");

  if(!lastResult){
    status.innerText="Errore: nessun dato";
    return;
  }

  status.innerText="Invio...";

  try{

    await fetch(SCRIPT_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({...lastResult,feedback:type})
    });

    status.innerText="Feedback inviato (controlla il foglio)";

  } catch(e){
    status.innerText="Errore invio";
  }
}

</script>

</body>
</html>
