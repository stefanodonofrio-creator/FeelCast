<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeelCast</title>
</head>

<body style="font-family: Arial; padding:20px; max-width:750px; margin:auto;">

<h2>FeelCast</h2>
<p style="color:#555;">Not the weather. The feeling.</p>

<label><strong>Profilo:</strong></label><br>
<select id="profile">
  <option value="0">Neutro</option>
  <option value="-1">Freddoloso</option>
  <option value="1">Caloroso</option>
</select>

<br><br>

<label><strong>Luogo:</strong></label><br>
<input type="radio" name="mode" value="geo" checked> Posizione attuale<br>
<input type="radio" name="mode" value="city"> Cerca città

<div id="cityBox" style="display:none; margin-top:10px;">
  <input type="text" id="cityInput" placeholder="es. Berlin" style="width:100%; max-width:400px;">
  <div id="suggestions" style="border:1px solid #ddd; max-width:400px;"></div>
</div>

<br>

<label><strong>Data e ora:</strong></label><br>
<input type="datetime-local" id="datetime">

<br><br>

<button onclick="checkWeather()">Controlla</button>

<hr>

<div id="result" style="white-space: pre-line; font-size:18px;"></div>

<div id="feedbackBox" style="display:none; margin-top:20px;">
  <strong>Feedback:</strong><br><br>
  <button onclick="sendFeedback('ok')">👍</button>
  <button onclick="sendFeedback('meh')">😐</button>
  <button onclick="sendFeedback('no')">👎</button>
  <div id="feedbackStatus" style="margin-top:10px;"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo-0iSNwMqWwJVKuBTZ3uIiqTRWxsdtLS_0hIHStYvVh7i3gni9lAqXsGHgynfsAdC9g/exec";

let lastResult = null;
let selectedCity = null;
let debounceTimer;

/* =========================
   UI BASE
========================= */

document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const cityMode = document.querySelector('input[name="mode"]:checked').value === "city";
    document.getElementById("cityBox").style.display = cityMode ? "block" : "none";
  });
});

(function () {
  const now = new Date();
  now.setMinutes(0, 0, 0);
  document.getElementById("datetime").value =
    new Date(now - now.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 16);
})();

/* =========================
   AUTOCOMPLETE CITTÀ
========================= */

document.getElementById("cityInput").addEventListener("input", function () {
  clearTimeout(debounceTimer);

  const query = this.value.trim();
  const box = document.getElementById("suggestions");
  selectedCity = null;

  if (query.length < 2) {
    box.innerHTML = "";
    return;
  }

  debounceTimer = setTimeout(async () => {
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=it`
      );
      const data = await res.json();

      box.innerHTML = "";

      if (!data || !data.results) return;

      data.results.forEach(r => {
        const div = document.createElement("div");
        div.style.padding = "6px";
        div.style.cursor = "pointer";
        div.style.borderBottom = "1px solid #eee";
        div.innerText = `${r.name}, ${r.country}`;

        div.onclick = () => {
          selectedCity = r;
          document.getElementById("cityInput").value = `${r.name}, ${r.country}`;
          box.innerHTML = "";
        };

        box.appendChild(div);
      });
    } catch (e) {
      console.error("Errore città:", e);
    }
  }, 300);
});

/* =========================
   LOGICA METEO
========================= */

function computeScore(p, profile) {
  let s = p.apparent_temperature;

  if (p.wind_speed > 20) s -= 1;
  else if (p.wind_speed > 10) s -= 0.5;

  if (p.wind_gusts > 50) s -= 1;
  else if (p.wind_gusts > 30) s -= 0.5;

  // ☀️ luce (solo di giorno)
  if (p.is_day === 1) {
    if (p.cloudcover < 30) s += 1;        // sole diretto
    else if (p.cloudcover < 70) s += 0.5; // luce diffusa
  }

  // 💧 umidità (sempre)
  if (p.humidity > 80 && s < 15) s -= 0.5;

  return s + profile;
}

function classifyFeeling(score) {
  if (score < 8) return "cold";
  if (score < 14) return "cool";
  if (score < 18) return "slightly_cool";
  return "mild_warm";
}

function getTrendFromStates(fNow, fNext, events) {

  if (events.sun_loss) return "senza sole si raffredda.";
  if (events.sun_gain) return "con il sole si scalda.";
  if (events.gusts) return "arrivano raffiche.";
  if (events.wind_increase) return "il vento aumenta.";

  const order = ["cold", "cool", "slightly_cool", "mild_warm"];
  const nowIndex = order.indexOf(fNow);
  const nextIndex = order.indexOf(fNext);

  if (nextIndex > nowIndex) return "si sentirà più caldo.";
  if (nextIndex < nowIndex) return "si sentirà più fresco.";

  return "la sensazione resterà simile.";
}

function applyTense(text, isFuture) {
  if (!isFuture) return text;

  return text
    .replace("È ", "Sarà ")
    .replace("Si sta", "Si starà");
}

/* =========================
   MAIN
========================= */

async function checkWeather() {
  const resultDiv = document.getElementById("result");
  const fbBox = document.getElementById("feedbackBox");
  const fbStatus = document.getElementById("feedbackStatus");

  resultDiv.innerText = "Caricamento...";
  fbBox.style.display = "none";
  fbStatus.innerText = "";
  lastResult = null;

  try {
    const mode = document.querySelector('input[name="mode"]:checked').value;
    const dt = document.getElementById("datetime").value;

    if (!dt) {
      resultDiv.innerText = "Seleziona data e ora";
      return;
    }

    let lat, lon, label;

    if (mode === "city") {
      if (!selectedCity) {
        resultDiv.innerText = "Seleziona una città dalla lista";
        return;
      }
      lat = selectedCity.latitude;
      lon = selectedCity.longitude;
      label = `${selectedCity.name}, ${selectedCity.country}`;
    } else {
      const pos = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(
          resolve,
          () => reject(new Error("GEO_DENIED"))
        )
      );

      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      label = "Posizione attuale";
    }

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=apparent_temperature,wind_speed_10m,wind_gusts_10m,relative_humidity_2m,cloudcover,is_day&timezone=auto`;

    const res = await fetch(url);
    const data = await res.json();

    if (!data || !data.hourly || !data.hourly.time) {
      resultDiv.innerText = "Dati meteo non disponibili";
      return;
    }

    const times = data.hourly.time;
    const target = new Date(dt + ":00").getTime();

    let idx = 0;
    let best = Infinity;

    times.forEach((t, i) => {
      const d = Math.abs(new Date(t).getTime() - target);
      if (d < best) {
        best = d;
        idx = i;
      }
    });

    const nextIdx = Math.min(idx + 1, times.length - 1);

    const nowPoint = {
      apparent_temperature: data.hourly.apparent_temperature[idx],
      wind_speed: data.hourly.wind_speed_10m[idx],
      wind_gusts: data.hourly.wind_gusts_10m[idx],
      humidity: data.hourly.relative_humidity_2m[idx],
      cloudcover: data.hourly.cloudcover[idx],
      is_day: data.hourly.is_day[idx]
    };

    const nextPoint = {
      apparent_temperature: data.hourly.apparent_temperature[nextIdx],
      wind_speed: data.hourly.wind_speed_10m[nextIdx],
      wind_gusts: data.hourly.wind_gusts_10m[nextIdx],
      humidity: data.hourly.relative_humidity_2m[nextIdx],
      cloudcover: data.hourly.cloudcover[nextIdx],
      is_day: data.hourly.is_day[nextIdx]
    };

    const profile = parseInt(document.getElementById("profile").value, 10);

    const sNow = computeScore(nowPoint, profile);
    const sNext = computeScore(nextPoint, profile);

    const fNow = classifyFeeling(sNow);
    const fNext = classifyFeeling(sNext);

    const events = {
       sun_loss:
    	nowPoint.is_day === 1 &&
    	nextPoint.is_day === 1 &&
    	nowPoint.cloudcover < 30 &&
    	nextPoint.cloudcover > 60,
      sun_gain: 
    	nowPoint.is_day === 1 &&
   	 nextPoint.is_day === 1 &&
    	nowPoint.cloudcover > 60 &&
    	nextPoint.cloudcover < 30,
      wind_increase: nextPoint.wind_speed - nowPoint.wind_speed > 10,
      gusts: nowPoint.wind_gusts < 30 && nextPoint.wind_gusts > 40
    };

    const trend = getTrendFromStates(fNow, fNext, events);

    const isFuture = new Date(dt) > new Date();

    let base = {
      cold: "È freddo.",
      cool: "È fresco.",
      slightly_cool: "È leggermente fresco.",
      mild_warm: "Si sta bene."
    }[fNow];

    base = applyTense(base, isFuture);

    const output =
      base + "\n\n" +
      "Nell’ora successiva " + trend;

    resultDiv.innerText = output;

    fbBox.style.display = "block";

  } catch (e) {
    console.error(e);

    if (e.message === "GEO_DENIED") {
      resultDiv.innerText = "Posizione non disponibile";
      return;
    }

    resultDiv.innerText = "Errore";
  }
}

/* =========================
   FEEDBACK
========================= */

async function sendFeedback(type) {
  const status = document.getElementById("feedbackStatus");

  if (!lastResult) {
    status.innerText = "Errore: nessun dato";
    return;
  }

  status.innerText = "Invio...";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...lastResult, feedback: type })
    });

    status.innerText = "Feedback inviato";
  } catch (e) {
    status.innerText = "Errore invio";
  }
}
</script>

</body>
</html>
