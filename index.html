<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeelCast</title>
</head>

<body style="font-family: Arial; padding:20px; max-width:750px; margin:auto;">

  <h2>FeelCast</h2>
  <p style="color:#555;">Not the weather. The feeling.</p>

  <label><strong>Profilo:</strong></label><br>
  <select id="profile">
    <option value="0">Neutro</option>
    <option value="-1">Freddoloso</option>
    <option value="1">Caloroso</option>
  </select>

  <br><br>

  <label><strong>Luogo:</strong></label><br>
  <input type="radio" name="mode" value="geo" checked> Posizione attuale<br>
  <input type="radio" name="mode" value="city"> Cerca città

  <div id="cityBox" style="display:none; margin-top:10px;">
    <input type="text" id="cityInput" placeholder="es. Berlin" style="width:100%; max-width:400px;">
    <div id="suggestions" style="border:1px solid #ddd; max-width:400px;"></div>
  </div>

  <br>

  <label><strong>Data e ora:</strong></label><br>
  <input type="datetime-local" id="datetime">

  <br><br>

  <button onclick="checkWeather()">Controlla</button>

  <hr>

  <div id="result" style="white-space: pre-line; font-size:18px;"></div>

  <div id="feedbackBox" style="display:none; margin-top:20px;">
    <strong>Com’è la tua sensazione rispetto alla previsione?</strong><br><br>

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px;">
      <label style="cursor:pointer;">
        <input type="radio" name="perceived" value="too_warm">
        🥵 Fa più caldo
      </label>

      <label style="cursor:pointer;">
        <input type="radio" name="perceived" value="correct">
        ✅ Giusto
      </label>

      <label style="cursor:pointer;">
        <input type="radio" name="perceived" value="too_cold">
        🥶 Fa più freddo
      </label>
    </div>

    <textarea
      id="freeFeedback"
      placeholder="Vuoi aggiungere un commento? (opzionale)"
      style="display:block; width:100%; max-width:400px; min-height:70px;"
    ></textarea>

    <button onclick="sendFeedback()" style="margin-top:10px;">
      Invia feedback
    </button>

    <div id="feedbackStatus" style="margin-top:10px;"></div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo-0iSNwMqWwJVKuBTZ3uIiqTRWxsdtLS_0hIHStYvVh7i3gni9lAqXsGHgynfsAdC9g/exec";

let lastResult = null;
let selectedCity = null;
let debounceTimer;

/* =========================
   UI
========================= */

document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const cityMode = document.querySelector('input[name="mode"]:checked').value === "city";
    document.getElementById("cityBox").style.display = cityMode ? "block" : "none";
  });
});

(function initializeDatetime() {
  const now = new Date();
  const rounded = new Date(now);

  if (rounded.getMinutes() <= 30) {
    rounded.setMinutes(30, 0, 0);
  } else {
    rounded.setHours(rounded.getHours() + 1, 0, 0, 0);
  }

  document.getElementById("datetime").value =
    new Date(rounded - rounded.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 16);
})();

/* =========================
   AUTOCOMPLETE
========================= */

document.getElementById("cityInput").addEventListener("input", function () {
  clearTimeout(debounceTimer);

  const query = this.value.trim();
  const box = document.getElementById("suggestions");
  selectedCity = null;

  if (query.length < 2) {
    box.innerHTML = "";
    return;
  }

  debounceTimer = setTimeout(async () => {
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5`
      );

      if (!res.ok) {
        box.innerHTML = "";
        return;
      }

      const data = await res.json();
      box.innerHTML = "";

      if (!data || !data.results) return;

      data.results.forEach(r => {
        const div = document.createElement("div");
        div.style.padding = "6px";
        div.style.cursor = "pointer";
        div.style.borderBottom = "1px solid #eee";
        div.innerText = `${r.name}, ${r.country}`;

        div.onclick = () => {
          selectedCity = r;
          document.getElementById("cityInput").value = div.innerText;
          box.innerHTML = "";
        };

        box.appendChild(div);
      });
    } catch (e) {
      console.error("Errore città:", e);
      box.innerHTML = "";
    }
  }, 300);
});

/* =========================
   EXTRACTION
========================= */

function extractPoint(hourly, index) {
  return {
    temperature_2m: hourly.temperature_2m?.[index],
    apparent_temperature: hourly.apparent_temperature?.[index],
    wind_speed: hourly.wind_speed_10m?.[index],
    wind_gusts: hourly.wind_gusts_10m?.[index],
    humidity: hourly.relative_humidity_2m?.[index],
    cloudcover: hourly.cloudcover?.[index] ?? 0,
    is_day: hourly.is_day?.[index],
    precipitation: hourly.precipitation?.[index] ?? 0,
    rain: hourly.rain?.[index] ?? 0,
    snowfall: hourly.snowfall?.[index] ?? 0
  };
}

function isPointValid(point) {
  return ![
    point.temperature_2m,
    point.apparent_temperature,
    point.wind_speed,
    point.wind_gusts,
    point.humidity,
    point.is_day,
    point.precipitation
  ].some(v => v == null || Number.isNaN(v));
}

/* =========================
   CLASSIFICATION
========================= */

function classify(s) {
  if (s < 4) return "very_cold";
  if (s < 9) return "cold";
  if (s < 14) return "cool";
  if (s < 20) return "ok";
  if (s < 26) return "warm";
  return "very_warm";
}

/* =========================
   SCORE
========================= */

function computeScore(point, profile) {
  let s = point.temperature_2m;

  if (point.wind_speed > 20) s -= 2;
  else if (point.wind_speed > 10) s -= 1;
  else if (point.wind_speed > 5) s -= 0.5;

  if (point.wind_gusts > 50) s -= 1;
  else if (point.wind_gusts > 30) s -= 0.5;

  if (point.humidity > 85 && point.temperature_2m < 12) s -= 1;

  if (point.is_day === 0) s -= 1;

  if (
    point.is_day === 1 &&
    point.cloudcover < 20 &&
    point.wind_speed < 10 &&
    point.temperature_2m >= 5 &&
    point.temperature_2m <= 12
  ) {
    s += 1;
  }

  let sunBoost = 0;

  if (point.is_day === 1 && point.cloudcover < 20) {
    if (point.wind_speed < 10) sunBoost = 4;
    else if (point.wind_speed < 20) sunBoost = 2;
    else sunBoost = 1;
  }

  let score_base = s;
  let score_sun = s + sunBoost;

  if (point.precipitation > 1) score_base -= 2;
  else if (point.precipitation > 0.5) score_base -= 1;

  const minAllowed = point.apparent_temperature - 3;

  if (score_base < minAllowed) {
    score_base = minAllowed;
  }

  if (score_sun < minAllowed) {
    score_sun = minAllowed;
  }

  return {
    score_base,
    score_sun,
    sunBoost
  };
}

/* =========================
   DRIVER
========================= */

function getDriverInfo(point, feeling_base, feeling_sun) {
  const rainForced = point.precipitation > 0.2;
  const windChangesState = point.wind_speed >= 10;
  const sunChangesState =
    point.is_day === 1 &&
    point.cloudcover < 20 &&
    feeling_sun !== feeling_base;

  const drivers = [];

  if (rainForced) {
    drivers.push({
      type: "rain",
      priority: 1
    });
  }

  if (windChangesState) {
    drivers.push({
      type: "wind",
      priority: 2
    });
  }

  if (sunChangesState) {
    drivers.push({
      type: "sun",
      priority: 3
    });
  }

  if (point.snowfall > 0 && (point.wind_speed > 10 || point.temperature_2m <= 0)) {
    drivers.push({
      type: "snow",
      priority: 4
    });
  }

  drivers.sort((a, b) => a.priority - b.priority);

  return {
    primary: drivers[0] || null,
    secondary: drivers[1] || null,
    rainForced,
    windExposedNote: point.wind_speed >= 10
  };
}

/* =========================
   COPY
========================= */

function isNearNow(selectedDate) {
  const diffMinutes = Math.abs(selectedDate.getTime() - Date.now()) / 60000;
  return diffMinutes <= 90;
}

function getDayLabel(date) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((target - today) / 86400000);

  if (diffDays === 0) return "today";
  if (diffDays === 1) return "tomorrow";
  return "other";
}

function getDayPart(hour) {
  if (hour < 12) return "mattina";
  if (hour < 18) return "pomeriggio";
  return "sera";
}

function formatMainTimePrefix(selectedDate) {
  const dayLabel = getDayLabel(selectedDate);

  if (dayLabel === "today") {
    const hh = String(selectedDate.getHours()).padStart(2, "0");
    const mm = String(selectedDate.getMinutes()).padStart(2, "0");
    return `Alle ${hh}:${mm}`;
  }

  if (dayLabel === "tomorrow") {
    return `Domani ${getDayPart(selectedDate.getHours())}`;
  }

  const weekday = selectedDate.toLocaleDateString("it-IT", { weekday: "long" });
  return `${weekday.charAt(0).toUpperCase() + weekday.slice(1)} ${getDayPart(selectedDate.getHours())}`;
}

function getFeelingPhrase(feelingKey, tense) {
  const presentMap = {
    very_cold: "Fa molto freddo",
    cold: "Fa freddo",
    cool: "Fuori è fresco",
    ok: "Si sta bene",
    warm: "Fa caldo",
    very_warm: "Fa molto caldo"
  };

  const futureMap = {
    very_cold: "farà molto freddo",
    cold: "farà freddo",
    cool: "fuori sarà fresco",
    ok: "si starà bene",
    warm: "farà caldo",
    very_warm: "farà molto caldo"
  };

  return tense === "present" ? presentMap[feelingKey] : futureMap[feelingKey];
}

function getSunStatePhrase(feeling_sun, tense) {
  const presentMap = {
    very_cold: "fa molto freddo",
    cold: "fa freddo",
    cool: "è fresco",
    ok: "si sta bene",
    warm: "fa caldo",
    very_warm: "fa molto caldo"
  };

  const futureMap = {
    very_cold: "farà molto freddo",
    cold: "farà freddo",
    cool: "sarà fresco",
    ok: "si starà bene",
    warm: "farà caldo",
    very_warm: "farà molto caldo"
  };

  return tense === "present" ? presentMap[feeling_sun] : futureMap[feeling_sun];
}

function buildFeelingBlock(feeling_base, feeling_sun, selectedDate) {
  const near = isNearNow(selectedDate);
  const tense = near ? "present" : "future";
  const basePhrase = getFeelingPhrase(feeling_base, tense);

  if (near) {
    if (feeling_base !== feeling_sun) {
      return `${basePhrase}; al sole ${getSunStatePhrase(feeling_sun, "present")}.`;
    }
    return `${basePhrase}.`;
  }

  const prefix = formatMainTimePrefix(selectedDate);

  if (feeling_base !== feeling_sun) {
    return `${prefix} ${basePhrase}; al sole ${getSunStatePhrase(feeling_sun, "future")}.`;
  }

  return `${prefix} ${basePhrase}.`;
}

function buildDriverBlock(point, driverInfo) {
  const parts = [];

  if (driverInfo.rainForced) {
    parts.push("La pioggia raffredda.");
  }

  if (driverInfo.windExposedNote) {
    parts.push("Sulle parti esposte si sente più freddo.");
  }

  return parts.join(" ");
}

/* =========================
   PRACTICAL ACTION
========================= */

function getPracticalAction(feeling_base, primaryDriver) {
  const driverType = primaryDriver?.type || "";

  if (driverType === "rain") {
    return "Serve qualcosa di impermeabile.";
  }

  if (driverType === "snow") {
    return "Meglio coprire bene mani, testa e collo.";
  }

  if (feeling_base === "very_cold") {
    if (driverType === "wind") return "Meglio proteggersi dal vento.";
    return "Meglio coprirsi bene.";
  }

  if (feeling_base === "cold") {
    if (driverType === "wind") return "Meglio proteggersi dal vento.";
    return "Meglio coprirsi bene.";
  }

  if (feeling_base === "cool") {
    if (driverType === "wind") return "Il vento fa sentire più freddo: meglio coprirsi.";
    return "Serve qualcosa da mettere addosso.";
  }

  if (feeling_base === "ok") {
    if (driverType === "sun") return "Basta qualcosa di leggero.";
    return "Non serve coprirsi molto.";
  }

  if (feeling_base === "warm") {
    return "Basta qualcosa di leggero.";
  }

  return "Meglio stare molto leggeri.";
}

function isActionCoherent(feeling_base, practicalAction) {
  if (!practicalAction) return true;

  if ((feeling_base === "warm" || feeling_base === "very_warm") && /copert|freddo|vento/i.test(practicalAction)) {
    return false;
  }

  return true;
}

/* =========================
   EVOLUTION
========================= */

function getTrendDirection(feelingNow, feelingNext) {
  const order = ["very_cold", "cold", "cool", "ok", "warm", "very_warm"];
  const nowIndex = order.indexOf(feelingNow);
  const nextIndex = order.indexOf(feelingNext);

  if (nextIndex > nowIndex) return "warming";
  if (nextIndex < nowIndex) return "cooling";
  return "stable";
}

function getTrendText(trendDirection) {
  const map = {
    warming: "Nell’ora successiva farà più caldo.",
    cooling: "Nell’ora successiva farà più freddo.",
    stable: "Nell’ora successiva cambia poco."
  };
  return map[trendDirection];
}

/* =========================
   FEEDBACK
========================= */

async function sendFeedback() {
  const status = document.getElementById("feedbackStatus");
  const comment = document.getElementById("freeFeedback").value;
  const selected = document.querySelector('input[name="perceived"]:checked');
  const perceived = selected ? selected.value : "";

  if (!lastResult) {
    status.innerText = "Errore: nessun dato da inviare";
    return;
  }

  if (!perceived && !comment.trim()) {
    status.innerText = "Seleziona un’opzione o scrivi un commento";
    return;
  }

  status.innerText = "Invio...";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...lastResult,
        perceived_error: perceived,
        comment: comment
      })
    });

    status.innerText = "Feedback inviato";
    document.getElementById("freeFeedback").value = "";
    document.querySelectorAll('input[name="perceived"]').forEach(el => {
      el.checked = false;
    });

  } catch (e) {
    console.error("Errore invio feedback:", e);
    status.innerText = "Errore invio";
  }
}

/* =========================
   MAIN
========================= */

async function checkWeather() {
  const resultDiv = document.getElementById("result");
  const feedbackBox = document.getElementById("feedbackBox");
  const feedbackStatus = document.getElementById("feedbackStatus");

  resultDiv.innerText = "Caricamento...";
  feedbackBox.style.display = "none";
  feedbackStatus.innerText = "";
  lastResult = null;

  try {
    const dt = document.getElementById("datetime").value;
    if (!dt) {
      resultDiv.innerText = "Seleziona data e ora";
      return;
    }

    const selectedDate = new Date(dt);
    if (Number.isNaN(selectedDate.getTime())) {
      resultDiv.innerText = "Data o ora non valide";
      return;
    }

    const mode = document.querySelector('input[name="mode"]:checked').value;
    let lat, lon, locationLabel;

    if (mode === "city") {
      if (!selectedCity) {
        resultDiv.innerText = "Seleziona una città dalla lista";
        return;
      }

      lat = selectedCity.latitude;
      lon = selectedCity.longitude;
      locationLabel = `${selectedCity.name}, ${selectedCity.country}`;
    } else {
      const pos = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(
          resolve,
          () => reject(new Error("GEO_DENIED"))
        )
      );

      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      locationLabel = "Posizione attuale";
    }

    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,apparent_temperature,wind_speed_10m,wind_gusts_10m,relative_humidity_2m,cloudcover,is_day,precipitation,rain,snowfall&timezone=auto`
    );

    if (!res.ok) {
      resultDiv.innerText = `Errore meteo (${res.status})`;
      return;
    }

    const data = await res.json();

    if (!data || !data.hourly || !data.hourly.time) {
      resultDiv.innerText = "Dati meteo non disponibili";
      return;
    }

    const times = data.hourly.time;
    const target = selectedDate.getTime();

    let idx = 0;
    let best = Infinity;

    times.forEach((t, i) => {
      const diff = Math.abs(new Date(t).getTime() - target);
      if (diff < best) {
        best = diff;
        idx = i;
      }
    });

    const nextIdx = Math.min(idx + 1, times.length - 1);

    const nowPoint = extractPoint(data.hourly, idx);
    const nextPoint = extractPoint(data.hourly, nextIdx);

    if (!isPointValid(nowPoint) || !isPointValid(nextPoint)) {
      resultDiv.innerText = "Dati meteo incompleti";
      return;
    }

    const profile = parseInt(document.getElementById("profile").value, 10);
    const profileLabel = document.getElementById("profile").selectedOptions[0].text;

    const nowScores = computeScore(nowPoint, profile);
    const nextScores = computeScore(nextPoint, profile);

    const feeling_base = classify(nowScores.score_base);
    const feeling_sun = classify(nowScores.score_sun);
    const feeling_next = classify(nextScores.score_base);

    const driverInfo = getDriverInfo(nowPoint, feeling_base, feeling_sun);

    const feelingBlock = buildFeelingBlock(feeling_base, feeling_sun, selectedDate);
    const driverBlock = buildDriverBlock(nowPoint, driverInfo);

    let practicalAction = getPracticalAction(feeling_base, driverInfo.primary);
    const trendDirection = getTrendDirection(feeling_base, feeling_next);
    const trendText = getTrendText(trendDirection);

    if (!isActionCoherent(feeling_base, practicalAction)) {
      practicalAction = "";
    }

    const outputBlocks = [
      feelingBlock,
      driverBlock,
      practicalAction,
      trendText
    ].filter(Boolean);

    resultDiv.innerText = outputBlocks.join("\n\n");

    lastResult = {
      timestamp: new Date().toISOString(),
      profile: profileLabel,
      lat: lat,
      long: lon,
      location_label: locationLabel,
      selected_datetime: times[idx],

      temperature_2m: nowPoint.temperature_2m,
      apparent_temperature: nowPoint.apparent_temperature,
      wind: nowPoint.wind_speed,
      gusts: nowPoint.wind_gusts,
      humidity: nowPoint.humidity,
      cloudcover: nowPoint.cloudcover,
      precipitation: nowPoint.precipitation,
      rain: nowPoint.rain,
      snowfall: nowPoint.snowfall,

      feeling: feelingBlock,
      driver: driverInfo.primary?.type || "",
      note: practicalAction,
      feedback: "",
      trend: trendText,
      perceived_error: "",
      comment: "",

      feeling_now: feeling_base,
      feeling_sun: feeling_sun !== feeling_base ? feeling_sun : "",
      driver_main: driverInfo.primary?.type || "",
      practical_action: practicalAction,
      trend_direction: trendDirection,

      score_base: nowScores.score_base,
      score_sun: nowScores.score_sun
    };

    feedbackBox.style.display = "block";

  } catch (e) {
    console.error(e);

    if (e.message === "GEO_DENIED") {
      resultDiv.innerText = "Posizione non disponibile";
      return;
    }

    resultDiv.innerText = "Errore";
  }
}
</script>

</body>
</html>
