<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeelCast</title>
</head>

<body style="font-family: Arial; padding:20px; max-width:750px; margin:auto;">

<h2>FeelCast</h2>
<p style="color:#555;">Not the weather. The feeling.</p>

<label><strong>Profilo:</strong></label><br>
<select id="profile">
  <option value="0">Neutro</option>
  <option value="-1">Freddoloso</option>
  <option value="1">Caloroso</option>
</select>

<br><br>

<label><strong>Luogo:</strong></label><br>
<input type="radio" name="mode" value="geo" checked> Posizione attuale<br>
<input type="radio" name="mode" value="city"> Cerca città

<div id="cityBox" style="display:none; margin-top:10px;">
  <input type="text" id="cityInput" placeholder="es. Berlin" style="width:100%; max-width:400px;">
  <div id="suggestions" style="border:1px solid #ddd; max-width:400px;"></div>
</div>

<br>

<label><strong>Data e ora:</strong></label><br>
<input type="datetime-local" id="datetime">

<br><br>

<button onclick="checkWeather()">Controlla</button>

<hr>

<div id="result" style="white-space: pre-line; font-size:18px;"></div>

<div id="feedbackBox" style="display:none; margin-top:20px;">
  <strong>Com’è la tua sensazione rispetto alla previsione?</strong><br><br>
  <button onclick="sendFeedback('too_warm')" style="margin-right:8px;">🥵 Fa più caldo</button>
  <button onclick="sendFeedback('correct')" style="margin-right:8px;">✅ Giusto</button>
  <button onclick="sendFeedback('too_cold')">🥶 Fa più freddo</button>
  <div id="feedbackStatus" style="margin-top:10px;"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo-0iSNwMqWwJVKuBTZ3uIiqTRWxsdtLS_0hIHStYvVh7i3gni9lAqXsGHgynfsAdC9g/exec";

let lastResult = null;
let selectedCity = null;
let debounceTimer;

/* =========================
   UI
========================= */

document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const cityMode = document.querySelector('input[name="mode"]:checked').value === "city";
    document.getElementById("cityBox").style.display = cityMode ? "block" : "none";
  });
});

(function () {
  const now = new Date();
  const rounded = new Date(now);

  if (rounded.getMinutes() <= 30) {
    rounded.setMinutes(30, 0, 0);
  } else {
    rounded.setHours(rounded.getHours() + 1, 0, 0, 0);
  }

  document.getElementById("datetime").value =
    new Date(rounded - rounded.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 16);
})();

/* =========================
   AUTOCOMPLETE
========================= */

document.getElementById("cityInput").addEventListener("input", function () {
  clearTimeout(debounceTimer);

  const query = this.value.trim();
  const box = document.getElementById("suggestions");
  selectedCity = null;

  if (query.length < 2) {
    box.innerHTML = "";
    return;
  }

  debounceTimer = setTimeout(async () => {
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5`
      );

      if (!res.ok) return;

      const data = await res.json();
      box.innerHTML = "";

      if (!data || !data.results) return;

      data.results.forEach(r => {
        const div = document.createElement("div");
        div.style.padding = "6px";
        div.style.cursor = "pointer";
        div.style.borderBottom = "1px solid #eee";
        div.innerText = `${r.name}, ${r.country}`;

        div.onclick = () => {
          selectedCity = r;
          document.getElementById("cityInput").value = div.innerText;
          box.innerHTML = "";
        };

        box.appendChild(div);
      });
    } catch (e) {
      console.error("Errore città:", e);
    }
  }, 300);
});

/* =========================
   FEELING CONFIG
========================= */

const FEELING_THRESHOLDS = {
  very_cold: 5,
  cold: 10,
  ok: 18,
  warm: 24
};

function classifyFeeling(score) {
  if (score < FEELING_THRESHOLDS.very_cold) return "very_cold";
  if (score < FEELING_THRESHOLDS.cold) return "cold";
  if (score < FEELING_THRESHOLDS.ok) return "ok";
  if (score < FEELING_THRESHOLDS.warm) return "warm";
  return "very_warm";
}

/* =========================
   SCORE
========================= */

function getPrecipitationType(point) {
  if ((point.snowfall ?? 0) > 0) return "snow";

  const rain = point.rain ?? 0;
  const precipitation = point.precipitation ?? 0;

  if (rain > 0) {
    if (rain < 1) return "rain_light";
    if (rain < 3) return "rain_moderate";
    return "rain_heavy";
  }

  if (precipitation > 0) {
    if (precipitation < 1) return "rain_light";
    if (precipitation < 3) return "rain_moderate";
    return "rain_heavy";
  }

  return "none";
}

function isSnowImpactful(point) {
  if ((point.snowfall ?? 0) <= 0) return false;
  return point.apparent_temperature <= 0 || point.wind_speed > 20 || point.wind_gusts > 30;
}

function computeScore(p, profile) {
  let s = p.apparent_temperature;

  if (p.wind_speed > 20) s -= 1;
  else if (p.wind_speed > 10) s -= 0.5;

  if (p.wind_gusts > 50) s -= 1;
  else if (p.wind_gusts > 30) s -= 0.5;

  if (p.humidity > 80 && s < 15) s -= 0.5;

  const precipitationType = getPrecipitationType(p);

  if (precipitationType === "rain_light") s -= 0.5;
  else if (precipitationType === "rain_moderate") s -= 1;
  else if (precipitationType === "rain_heavy") s -= 2;
  else if (precipitationType === "snow") {
    if (p.apparent_temperature <= 0) s -= 0.5;
    if (p.wind_speed > 20 || p.wind_gusts > 30) s -= 1;
  }

  return s + profile;
}

function computeSunBoost(p) {
  if (!(p.is_day === 1 && p.cloudcover < 20)) return 0;

  let windLevel = 0;
  if (p.wind_speed > 20) windLevel = 2;
  else if (p.wind_speed > 10) windLevel = 1;

  if (windLevel === 0) return 4;
  if (windLevel === 1) return 2.5;
  return 1;
}

/* =========================
   TIME / COPY
========================= */

function isNearNow(selectedDate) {
  const diffMin = Math.abs(selectedDate.getTime() - Date.now()) / 60000;
  return diffMin <= 90;
}

function getDayLabel(date) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((target - today) / 86400000);

  if (diffDays === 0) return "today";
  if (diffDays === 1) return "tomorrow";
  return "other";
}

function getDayPart(hour) {
  if (hour < 12) return "mattina";
  if (hour < 18) return "pomeriggio";
  return "sera";
}

function formatMainTimePrefix(selectedDate) {
  const dayLabel = getDayLabel(selectedDate);

  if (dayLabel === "today") {
    const hh = String(selectedDate.getHours()).padStart(2, "0");
    const mm = String(selectedDate.getMinutes()).padStart(2, "0");
    return `Alle ${hh}:${mm}`;
  }

  if (dayLabel === "tomorrow") {
    return `Domani ${getDayPart(selectedDate.getHours())}`;
  }

  const weekday = selectedDate.toLocaleDateString("it-IT", { weekday: "long" });
  return `${weekday.charAt(0).toUpperCase() + weekday.slice(1)} ${getDayPart(selectedDate.getHours())}`;
}

function getFeelingPhrase(feelingKey, tense) {
  const presentMap = {
    very_cold: "Fa molto freddo",
    cold: "Fa freddo",
    ok: "Si sta bene",
    warm: "Fa caldo",
    very_warm: "Fa molto caldo"
  };

  const futureMap = {
    very_cold: "farà molto freddo",
    cold: "farà freddo",
    ok: "si starà bene",
    warm: "farà caldo",
    very_warm: "farà molto caldo"
  };

  return tense === "present" ? presentMap[feelingKey] : futureMap[feelingKey];
}

function getSunLocalPhrase(feelingNow, feelingSun, tense) {
  if (feelingSun === feelingNow) return "";

  if (tense === "present") {
    if (feelingNow === "very_cold" || feelingNow === "cold") return "al sole si sta meglio";
    if (feelingSun === "warm") return "al sole fa caldo";
    if (feelingSun === "very_warm") return "al sole fa molto caldo";
    return "al sole si sta meglio";
  }

  if (feelingNow === "very_cold" || feelingNow === "cold") return "al sole si starà meglio";
  if (feelingSun === "warm") return "al sole farà caldo";
  if (feelingSun === "very_warm") return "al sole farà molto caldo";
  return "al sole si starà meglio";
}

function buildFeelingBlock(feelingNow, feelingSun, selectedDate) {
  const near = isNearNow(selectedDate);
  const tense = near ? "present" : "future";
  const mainPhrase = getFeelingPhrase(feelingNow, tense);
  const sunPhrase = getSunLocalPhrase(feelingNow, feelingSun, tense);

  if (near) {
    if (sunPhrase) {
      return `${mainPhrase} all’ombra; ${sunPhrase}.`;
    }
    return `${mainPhrase}.`;
  }

  const prefix = formatMainTimePrefix(selectedDate);
  if (sunPhrase) {
    return `${prefix} ${mainPhrase} all’ombra; ${sunPhrase}.`;
  }
  return `${prefix} ${mainPhrase}.`;
}

/* =========================
   DRIVER
========================= */

function getDriverMain(point, feelingNow, feelingSun) {
  const precipitationType = getPrecipitationType(point);
  const hasRain = precipitationType === "rain_light" || precipitationType === "rain_moderate" || precipitationType === "rain_heavy";
  const hasImpactfulSnow = precipitationType === "snow" && isSnowImpactful(point);
  const hasWind = point.wind_speed > 10 || point.wind_gusts > 30;
  const hasSun = point.is_day === 1 && point.cloudcover < 20 && feelingSun && feelingSun !== feelingNow;
  const hasHumidityCold = point.humidity > 80 && (feelingNow === "very_cold" || feelingNow === "cold");

  if (hasRain) return precipitationType;
  if (hasImpactfulSnow) return "snow";
  if (hasWind) return "wind";
  if (hasSun) return "sun";
  if (hasHumidityCold) return "humidity_cold";
  return "";
}

/* =========================
   PRACTICAL ACTION
========================= */

function getPracticalAction(feelingNow, driverMain) {
  if (driverMain === "rain_light" || driverMain === "rain_moderate" || driverMain === "rain_heavy") {
    return "Serve protezione dalla pioggia.";
  }

  if (driverMain === "snow") {
    return "Serve coprire bene le parti esposte.";
  }

  if (feelingNow === "very_cold") {
    if (driverMain === "wind") return "Serve protezione dal vento.";
    if (driverMain === "humidity_cold") return "È una situazione in cui è importante proteggersi dal freddo.";
    return "È una situazione in cui conviene restare coperti.";
  }

  if (feelingNow === "cold") {
    if (driverMain === "wind") return "Serve protezione dal vento.";
    if (driverMain === "humidity_cold") return "È una situazione in cui è importante proteggersi dal freddo.";
    return "È una situazione in cui conviene restare coperti.";
  }

  if (feelingNow === "ok") {
    if (driverMain === "wind") return "Serve coprire le parti esposte.";
    if (driverMain === "sun") return "È una situazione da abbigliamento leggero.";
    return "Non serve fare nulla.";
  }

  if (feelingNow === "warm") {
    return "È una situazione da abbigliamento leggero.";
  }

  return "È una situazione da abbigliamento molto leggero.";
}

function isActionCoherent(feelingNow, practicalAction) {
  if ((feelingNow === "warm" || feelingNow === "very_warm") && /copert|freddo|vento/i.test(practicalAction)) {
    return false;
  }

  if ((feelingNow === "very_cold" || feelingNow === "cold") && /abbigliamento molto leggero/i.test(practicalAction)) {
    return false;
  }

  return true;
}

/* =========================
   EVOLUTION
========================= */

function getTrendDirection(feelingNow, feelingNext) {
  const order = ["very_cold", "cold", "ok", "warm", "very_warm"];
  const nowIndex = order.indexOf(feelingNow);
  const nextIndex = order.indexOf(feelingNext);

  if (nextIndex > nowIndex) return "warming";
  if (nextIndex < nowIndex) return "cooling";
  return "stable";
}

function getTrendText(trendDirection) {
  const map = {
    warming: "Nell’ora successiva si scalda.",
    cooling: "Nell’ora successiva si raffredda.",
    stable: "Nell’ora successiva resta stabile."
  };
  return map[trendDirection];
}

/* =========================
   FEEDBACK
========================= */

async function sendFeedback(type) {
  const status = document.getElementById("feedbackStatus");

  if (!lastResult) {
    status.innerText = "Errore: nessun dato da inviare";
    return;
  }

  status.innerText = "Invio...";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...lastResult,
        perceived_error: type
      })
    });

    status.innerText = "Feedback inviato";
  } catch (e) {
    console.error("Errore invio feedback:", e);
    status.innerText = "Errore invio";
  }
}

/* =========================
   MAIN
========================= */

async function checkWeather() {
  const resultDiv = document.getElementById("result");
  const feedbackBox = document.getElementById("feedbackBox");
  const feedbackStatus = document.getElementById("feedbackStatus");

  resultDiv.innerText = "Caricamento...";
  feedbackBox.style.display = "none";
  feedbackStatus.innerText = "";
  lastResult = null;

  try {
    const dt = document.getElementById("datetime").value;
    if (!dt) {
      resultDiv.innerText = "Seleziona data e ora";
      return;
    }

    const selectedDate = new Date(dt);
    if (Number.isNaN(selectedDate.getTime())) {
      resultDiv.innerText = "Data o ora non valide";
      return;
    }

    const mode = document.querySelector('input[name="mode"]:checked').value;
    let lat, lon, locationLabel;

    if (mode === "city") {
      if (!selectedCity) {
        resultDiv.innerText = "Seleziona una città dalla lista";
        return;
      }
      lat = selectedCity.latitude;
      lon = selectedCity.longitude;
      locationLabel = `${selectedCity.name}, ${selectedCity.country}`;
    } else {
      const pos = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(
          resolve,
          () => reject(new Error("GEO_DENIED"))
        )
      );
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      locationLabel = "Posizione attuale";
    }

    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=apparent_temperature,wind_speed_10m,wind_gusts_10m,relative_humidity_2m,cloudcover,is_day,precipitation,rain,snowfall,weathercode&timezone=auto`
    );

    if (!res.ok) {
      resultDiv.innerText = `Errore meteo (${res.status})`;
      return;
    }

    const data = await res.json();

    if (!data || !data.hourly || !data.hourly.time) {
      resultDiv.innerText = "Dati meteo non disponibili";
      return;
    }

    const times = data.hourly.time;
    const target = selectedDate.getTime();

    let idx = 0;
    let best = Infinity;

    times.forEach((t, i) => {
      const diff = Math.abs(new Date(t).getTime() - target);
      if (diff < best) {
        best = diff;
        idx = i;
      }
    });

    const nextIdx = Math.min(idx + 1, times.length - 1);

    const nowPoint = {
      apparent_temperature: data.hourly.apparent_temperature?.[idx],
      wind_speed: data.hourly.wind_speed_10m?.[idx],
      wind_gusts: data.hourly.wind_gusts_10m?.[idx],
      humidity: data.hourly.relative_humidity_2m?.[idx],
      cloudcover: data.hourly.cloudcover?.[idx] ?? 0,
      is_day: data.hourly.is_day?.[idx],
      precipitation: data.hourly.precipitation?.[idx] ?? 0,
      rain: data.hourly.rain?.[idx] ?? 0,
      snowfall: data.hourly.snowfall?.[idx] ?? 0,
      weathercode: data.hourly.weathercode?.[idx] ?? null
    };

    const nextPoint = {
      apparent_temperature: data.hourly.apparent_temperature?.[nextIdx],
      wind_speed: data.hourly.wind_speed_10m?.[nextIdx],
      wind_gusts: data.hourly.wind_gusts_10m?.[nextIdx],
      humidity: data.hourly.relative_humidity_2m?.[nextIdx],
      cloudcover: data.hourly.cloudcover?.[nextIdx] ?? 0,
      is_day: data.hourly.is_day?.[nextIdx],
      precipitation: data.hourly.precipitation?.[nextIdx] ?? 0,
      rain: data.hourly.rain?.[nextIdx] ?? 0,
      snowfall: data.hourly.snowfall?.[nextIdx] ?? 0,
      weathercode: data.hourly.weathercode?.[nextIdx] ?? null
    };

    if (
      nowPoint.apparent_temperature == null ||
      nowPoint.wind_speed == null ||
      nowPoint.wind_gusts == null ||
      nowPoint.humidity == null ||
      nowPoint.is_day == null ||
      nextPoint.apparent_temperature == null ||
      nextPoint.wind_speed == null ||
      nextPoint.wind_gusts == null ||
      nextPoint.humidity == null ||
      nextPoint.is_day == null
    ) {
      resultDiv.innerText = "Dati meteo incompleti";
      return;
    }

    const profile = parseInt(document.getElementById("profile").value, 10);
    const profileLabel = document.getElementById("profile").selectedOptions[0].text;

    const sNow = computeScore(nowPoint, profile);
    const sNext = computeScore(nextPoint, profile);

    const sunBoostNow = computeSunBoost(nowPoint);
    const sSun = sNow + sunBoostNow;

    const feelingNow = classifyFeeling(sNow);
    const feelingSun = classifyFeeling(sSun);
    const feelingNext = classifyFeeling(sNext);

    const feelingBlock = buildFeelingBlock(feelingNow, feelingSun, selectedDate);
    const driverMain = getDriverMain(nowPoint, feelingNow, feelingSun);
    let practicalAction = getPracticalAction(feelingNow, driverMain);
    const trendDirection = getTrendDirection(feelingNow, feelingNext);
    const trendText = getTrendText(trendDirection);

    if (!isActionCoherent(feelingNow, practicalAction)) {
      practicalAction = "";
    }

    const outputBlocks = [
      feelingBlock,
      practicalAction,
      trendText
    ].filter(Boolean);

    resultDiv.innerText = outputBlocks.join("\n\n");

    lastResult = {
      timestamp: new Date().toISOString(),
      profile: profileLabel,
      lat: lat,
      long: lon,
      location_label: locationLabel,
      selected_datetime: times[idx],
      apparent_temperature: nowPoint.apparent_temperature,
      wind: nowPoint.wind_speed,
      gusts: nowPoint.wind_gusts,
      humidity: nowPoint.humidity,
      cloudcover: nowPoint.cloudcover,
      feeling: feelingBlock,
      driver: driverMain || "",
      note: practicalAction,
      feedback: null,
      trend: trendText,
      perceived_error: null,

      precipitation: nowPoint.precipitation,
      rain: nowPoint.rain,
      snowfall: nowPoint.snowfall,
      weathercode: nowPoint.weathercode,

      feeling_now: feelingNow,
      feeling_sun: feelingSun !== feelingNow ? feelingSun : "",
      driver_main: driverMain,
      practical_action: practicalAction,
      trend_direction: trendDirection
    };

    feedbackBox.style.display = "block";

  } catch (e) {
    console.error(e);

    if (e.message === "GEO_DENIED") {
      resultDiv.innerText = "Posizione non disponibile";
      return;
    }

    resultDiv.innerText = "Errore";
  }
}
</script>

</body>
</html>
