<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeelCast</title>
</head>

<body style="font-family: Arial; padding:20px; max-width:750px; margin:auto;">

<h2>FeelCast</h2>
<p style="color:#555;">Not the weather. The feeling.</p>

<label><strong>Profilo:</strong></label><br>
<select id="profile">
  <option value="0">Neutro</option>
  <option value="-1">Freddoloso</option>
  <option value="1">Caloroso</option>
</select>

<br><br>

<label><strong>Luogo:</strong></label><br>
<input type="radio" name="mode" value="geo" checked> Posizione attuale<br>
<input type="radio" name="mode" value="city"> Cerca città

<div id="cityBox" style="display:none; margin-top:10px;">
  <input type="text" id="cityInput" placeholder="es. Berlin" style="width:100%; max-width:400px;">
  <div id="suggestions" style="border:1px solid #ddd; max-width:400px;"></div>
</div>

<br>

<label><strong>Data e ora:</strong></label><br>
<input type="datetime-local" id="datetime">

<br><br>

<button onclick="checkWeather()">Controlla</button>

<hr>

<div id="result" style="white-space: pre-line; font-size:18px;"></div>

<div id="feedbackBox" style="display:none; margin-top:20px;">
  <strong>Com’è la tua sensazione rispetto alla previsione?</strong><br>
  <br>

  <button onclick="sendFeedback('too_warm')">Fa più caldo</button>
  <button onclick="sendFeedback('correct')">Giusto</button>
  <button onclick="sendFeedback('too_cold')">Fa più freddo</button>

  <div id="feedbackStatus" style="margin-top:10px;"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo-0iSNwMqWwJVKuBTZ3uIiqTRWxsdtLS_0hIHStYvVh7i3gni9lAqXsGHgynfsAdC9g/exec";

let lastResult = null;
let selectedCity = null;
let debounceTimer;

/* =========================
   COPY UTILS
========================= */

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

const feelingMap = {
  cold: ["È freddo", "Fa freddo", "Si sente freddo"],
  cool: ["È fresco", "Si sente fresco", "Si sente del fresco"],
  slightly_cool: ["È leggermente fresco", "Non è freddo, ma si sente fresco", "Si sente un po’ di fresco"],
  mild_warm: ["È mite", "Si sta bene", "Temperatura mite"]
};

const shadeLabels = ["All’ombra", "Senza sole"];
const sunLabels = ["Al sole", "Sotto il sole"];

const sunExtras = [
  "al sole si sente più caldo",
  "al sole il calore si sente di più"
];

const warmingMap = [
  "Poi si sente più caldo.",
  "Poi il calore si fa sentire di più."
];

const coolingMap = [
  "Poi si sente più fresco.",
  "Poi si rinfresca un po’."
];

const stableMap = [
  "Poi non cambierà molto.",
  "Poi rimane stabile."
];

const layerAdvice = [
  "Meglio avere uno strato in più addosso.",
  "Può servire uno strato in più per non sentire freddo."
];

const noLayerAdvice = [
  "Non dovrebbe esserci bisogno di uno strato in più o in meno.",
  "Non serve aggiungere o togliere strati."
];

/* =========================
   UI
========================= */

document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const cityMode = document.querySelector('input[name="mode"]:checked').value === "city";
    document.getElementById("cityBox").style.display = cityMode ? "block" : "none";
  });
});

(function () {
  const now = new Date();
  now.setMinutes(0, 0, 0);
  document.getElementById("datetime").value =
    new Date(now - now.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 16);
})();

/* =========================
   AUTOCOMPLETE
========================= */

document.getElementById("cityInput").addEventListener("input", function () {
  clearTimeout(debounceTimer);

  const query = this.value.trim();
  const box = document.getElementById("suggestions");
  selectedCity = null;

  if (query.length < 2) {
    box.innerHTML = "";
    return;
  }

  debounceTimer = setTimeout(async () => {
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5`
      );
      const data = await res.json();

      box.innerHTML = "";

      if (!data || !data.results) return;

      data.results.forEach(r => {
        const div = document.createElement("div");
        div.style.padding = "6px";
        div.style.cursor = "pointer";
        div.style.borderBottom = "1px solid #eee";
        div.innerText = `${r.name}, ${r.country}`;
        div.onclick = () => {
          selectedCity = r;
          document.getElementById("cityInput").value = div.innerText;
          box.innerHTML = "";
        };
        box.appendChild(div);
      });
    } catch (e) {
      console.error("Errore città:", e);
    }
  }, 300);
});

/* =========================
   LOGICA
========================= */

function computeScore(p, profile) {
  let s = p.apparent_temperature;

  if (p.wind_speed > 20) s -= 1;
  else if (p.wind_speed > 10) s -= 0.5;

  if (p.wind_gusts > 50) s -= 1;
  else if (p.wind_gusts > 30) s -= 0.5;

  if (p.is_day === 1 && p.cloudcover < 30) s += 1;

  if (p.humidity > 80 && s < 15) s -= 0.5;

  return s + profile;
}

function classifyFeeling(score) {
  if (score < 8) return "cold";
  if (score < 14) return "cool";
  if (score < 18) return "slightly_cool";
  return "mild_warm";
}

function renderFeeling(feelingKey) {
  return pick(feelingMap[feelingKey]);
}

/* =========================
   DECISION LAYER
========================= */

function getRisk(feelingKey) {
  if (feelingKey === "cold") return "high_cold";
  if (feelingKey === "cool") return "medium_cold";
  if (feelingKey === "slightly_cool") return "low_cold";
  return "neutral_or_warm";
}

function getTrendDirection(fNow, fNext) {
  const order = ["cold", "cool", "slightly_cool", "mild_warm"];
  const iNow = order.indexOf(fNow);
  const iNext = order.indexOf(fNext);

  if (iNext > iNow) return "warming";
  if (iNext < iNow) return "cooling";
  return "stable";
}

function getDecision(risk, trend) {
  if (risk === "high_cold") {
    if (trend === "warming") return "layer_now_remove_later";
    return "layer_now";
  }

  if (risk === "medium_cold") {
    if (trend === "warming") return "light_layer_optional";
    return "light_layer";
  }

  if (risk === "low_cold") {
    if (trend === "cooling") return "consider_layer";
    return "no_layer_needed";
  }

  if (risk === "neutral_or_warm") {
    if (trend === "cooling") return "maybe_layer_later";
    return "no_layer";
  }

  return "no_layer";
}

function decisionText(code) {
  const layerCodes = [
    "layer_now",
    "layer_now_remove_later",
    "light_layer",
    "light_layer_optional",
    "consider_layer"
  ];

  if (layerCodes.includes(code)) {
    return pick(layerAdvice);
  }

  return pick(noLayerAdvice);
}

/* =========================
   SOLE / OMBRA
========================= */

function computeSunBoost(p) {
  if (!(p.is_day === 1 && p.cloudcover < 20)) return 0;

  let windLevel = 0;
  if (p.wind_speed > 20) windLevel = 2;
  else if (p.wind_speed > 10) windLevel = 1;

  if (windLevel === 0) return 4;
  if (windLevel === 1) return 2.5;
  return 1;
}

/* =========================
   FEEDBACK
========================= */

async function sendFeedback(type) {
  const status = document.getElementById("feedbackStatus");

  if (!lastResult) {
    status.innerText = "Errore: nessun dato da inviare";
    return;
  }

  status.innerText = "Invio...";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...lastResult,
        perceived_error: type
      })
    });

    status.innerText = "Feedback inviato";
  } catch (e) {
    console.error("Errore invio feedback:", e);
    status.innerText = "Errore invio";
  }
}

/* =========================
   MAIN
========================= */

async function checkWeather() {
  const resultDiv = document.getElementById("result");
  const feedbackBox = document.getElementById("feedbackBox");
  const feedbackStatus = document.getElementById("feedbackStatus");

  resultDiv.innerText = "Caricamento...";
  feedbackBox.style.display = "none";
  feedbackStatus.innerText = "";
  lastResult = null;

  try {
    const dt = document.getElementById("datetime").value;

    if (!dt) {
      resultDiv.innerText = "Seleziona data e ora";
      return;
    }

    let lat, lon, locationLabel;
    const mode = document.querySelector('input[name="mode"]:checked').value;

    if (mode === "city") {
      if (!selectedCity) {
        resultDiv.innerText = "Seleziona una città dalla lista";
        return;
      }
      lat = selectedCity.latitude;
      lon = selectedCity.longitude;
      locationLabel = `${selectedCity.name}, ${selectedCity.country}`;
    } else {
      const pos = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(
          resolve,
          () => reject(new Error("GEO_DENIED"))
        )
      );
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      locationLabel = "Posizione attuale";
    }

    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=apparent_temperature,wind_speed_10m,wind_gusts_10m,relative_humidity_2m,cloudcover,is_day&timezone=auto`
    );

    const data = await res.json();

    if (!data || !data.hourly || !data.hourly.time) {
      resultDiv.innerText = "Dati meteo non disponibili";
      return;
    }

    const times = data.hourly.time;
    const target = new Date(dt).getTime();

    let idx = 0;
    let best = Infinity;

    times.forEach((t, i) => {
      const diff = Math.abs(new Date(t).getTime() - target);
      if (diff < best) {
        best = diff;
        idx = i;
      }
    });

    const nextIdx = Math.min(idx + 1, times.length - 1);

    const now = {
      apparent_temperature: data.hourly.apparent_temperature[idx],
      wind_speed: data.hourly.wind_speed_10m[idx],
      wind_gusts: data.hourly.wind_gusts_10m[idx],
      humidity: data.hourly.relative_humidity_2m[idx] ?? 50,
      cloudcover: data.hourly.cloudcover[idx] ?? 0,
      is_day: data.hourly.is_day[idx]
    };

    const next = {
      apparent_temperature: data.hourly.apparent_temperature[nextIdx],
      wind_speed: data.hourly.wind_speed_10m[nextIdx],
      wind_gusts: data.hourly.wind_gusts_10m[nextIdx],
      humidity: data.hourly.relative_humidity_2m[nextIdx],
      cloudcover: data.hourly.cloudcover[nextIdx] ?? 0,
      is_day: data.hourly.is_day[nextIdx]
    };

    const profile = parseInt(document.getElementById("profile").value, 10);
    const profileLabel = document.getElementById("profile").selectedOptions[0].text;

    const sNow = computeScore(now, profile);
    const sNext = computeScore(next, profile);

    const fNowKey = classifyFeeling(sNow);
    const fNextKey = classifyFeeling(sNext);

    const fNowText = renderFeeling(fNowKey);

    const riskNow = getRisk(fNowKey);
    const trendDirection = getTrendDirection(fNowKey, fNextKey);
    const decisionCode = getDecision(riskNow, trendDirection);

    const sunBoostNow = computeSunBoost(now);
    const sShade = sNow;
    const sSun = sNow + sunBoostNow;

    const fShadeKey = classifyFeeling(sShade);
    const fSunKey = classifyFeeling(sSun);

    const fShadeText = renderFeeling(fShadeKey);
    const fSunText = renderFeeling(fSunKey);

    const hasSunDifference = (fShadeKey !== fSunKey);
    const strongSunPerception = sunBoostNow >= 2.5 && fShadeKey === fSunKey;

    let trendText = "";

    if (trendDirection === "warming") {
      trendText = pick(warmingMap);
    } else if (trendDirection === "cooling") {
      trendText = pick(coolingMap);
    } else {
      trendText = pick(stableMap);
    }

    let baseText = "";

    if (hasSunDifference || strongSunPerception) {
      let sunLineText = fSunText;

      if (!hasSunDifference && strongSunPerception) {
        sunLineText += " (" + pick(sunExtras) + ")";
      }

      baseText =
        pick(shadeLabels) + ": " + fShadeText + "\n" +
        pick(sunLabels) + ": " + sunLineText;
    } else {
      baseText = fNowText;
    }

    const decision = decisionText(decisionCode);

    resultDiv.innerText =
      baseText + "\n\n" +
      trendText + "\n\n" +
      decision;

    lastResult = {
      timestamp: new Date().toISOString(),

      profile: document.getElementById("profile").selectedOptions[0].text,

      lat: lat,
      long: lon,
      location_label: locationLabel,

      selected_datetime: times[idx],

      apparent_temperature: now.apparent_temperature,
      wind: now.wind_speed,
      gusts: now.wind_gusts,
      humidity: now.humidity,
      cloudcover: now.cloudcover,

      feeling: fNowText,

      driver: hasSunDifference || strongSunPerception
        ? "sun_exposure"
        : "base",

      note: hasSunDifference
        ? "shade_vs_sun"
        : strongSunPerception
        ? "strong_sun"
        : "none",

      trend: trendText,

      feedback: null   // mantiene compatibilità col vecchio schema
  };

    feedbackBox.style.display = "block";

  } catch (e) {
    console.error(e);

    if (e.message === "GEO_DENIED") {
      resultDiv.innerText = "Posizione non disponibile";
      return;
    }

    resultDiv.innerText = "Errore";
  }
}
</script>

</body>
</html>
